<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK birthday · random non‑repeating comments</title>
    <!-- Leaflet map library -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        #map { height: 100vh; width: 100vw; }

        .info-banner {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 22px;
            border-radius: 40px;
            font-weight: 500;
            backdrop-filter: blur(6px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-left: 6px solid #ffb347;
            font-size: 1.1rem;
            pointer-events: none;
        }
        .info-banner i { color: #ffd966; margin-right: 8px; }

        .message-toast {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(8px);
            color: white;
            padding: 16px 36px;
            border-radius: 60px;
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,215,0,0.5);
            text-align: center;
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 0;
            pointer-events: none;
            max-width: 80%;
            white-space: nowrap;
        }
        .message-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-10px);
        }
        /* allow longer messages to wrap on small screens */
        @media (max-width: 700px) {
            .message-toast { font-size: 1.2rem; white-space: normal; }
        }

        .status-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 40, 80, 0.8);
            color: #aaddff;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            backdrop-filter: blur(4px);
            border: 1px solid #4a9eff;
        }
        .status-badge.loading { background: rgba(80, 40, 0, 0.8); border-color: #ffaa33; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="message-toast" id="clickMessage"></div>
    <div class="status-badge" id="status">👆 click to sample</div>

    <script>
        (function() {
             // ---------- message pools (exactly as provided) ----------
            const seaMessages = [
                "Hope your birthday is whale-y awesome Ben!",
                "Have a fin-tastic birthday Ben!",
                "Hope you have a porpoise-ful and fun day Ben.",
                "SEA Ben? It's your special day!",
                "Your birthday is just shore to be amazing Ben!",
                "I hope your day is smooth sailing Ben.",
                "Ben - you were shore-ly born today.",
                "Have an ocean of fun on your birthday Ben!",
                "You're otterly amazing Ben. Happy Birthday!",
                "I hope your day is filled with currents of joy Ben.",
                "Water we celebrating Ben? Oh yeah, your birthday!",
                "Ben - I'm shore you're going to have a great day!",
                "Whale done for making it another year Ben!"
            ];

            const landMessages = [
                "Hope your birthday is down to earth Ben!",
                "Hope your birthday is a peak experience Ben!",
                "You're a ROCK star Ben. Happy Birthday!",
                "Have a terra-fic day Ben!",
                "Another year older Ben? Sedimental-ry, my dear Watson.",
                "Have an earth-quakingly good birthday Ben!",
                "You're so grounded. Happy Birthday Ben!",
                "I'm soil-emnly promising this will be your best birthday yet Ben.",
                "Hope your special day is ground-breaking Ben."
            ];

            // Track used messages (by index) for each pool
            let usedSeaIndices = [];
            let usedLandIndices = [];

            // Helper: get random unused message from a given pool array + used tracking array
            function getRandomMessage(pool, usedArray) {
                // If all messages have been used, reset the used tracker
                if (usedArray.length >= pool.length) {
                    usedArray.length = 0;   // empty the array
                }

                // Build list of available indices (those not in usedArray)
                const availableIndices = [];
                for (let i = 0; i < pool.length; i++) {
                    if (!usedArray.includes(i)) {
                        availableIndices.push(i);
                    }
                }

                // Choose random available index
                const randomIdx = availableIndices[Math.floor(Math.random() * availableIndices.length)];
                // Mark as used
                usedArray.push(randomIdx);
                // Return the message string
                return pool[randomIdx];
            }

            // ---------- map setup ----------
            const map = L.map('map').setView([54.5, -3.5], 6);

            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri — source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community',
                maxZoom: 18,
                crossOrigin: 'anonymous'
            }).addTo(map);

            const msgEl = document.getElementById('clickMessage');
            const statusEl = document.getElementById('status');
            let toastTimer = null;

            function showMessage(text) {
                if (toastTimer) clearTimeout(toastTimer);
                msgEl.textContent = text;
                msgEl.classList.add('show');
                toastTimer = setTimeout(() => {
                    msgEl.classList.remove('show');
                    toastTimer = null;
                }, 3000); // slightly longer for longer sentences
            }

            // ---------- RGB to HSL (same perfect detection) ----------
            function rgbToHsl(r, g, b) {
                r /= 255, g /= 255, b /= 255;
                let max = Math.max(r, g, b), min = Math.min(r, g, b);
                let h, s, l = (max + min) / 2;

                if (max === min) {
                    h = s = 0;
                } else {
                    let d = max - min;
                    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                    switch (max) {
                        case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                        case g: h = (b - r) / d + 2; break;
                        case b: h = (r - g) / d + 4; break;
                    }
                    h *= 60;
                }
                return { h, s, l };
            }

            function isSeaColor(r, g, b) {
                const { h, s, l } = rgbToHsl(r, g, b);
                // ignore very dark, very bright/white, or low saturation (clouds / shadows)
                if (l < 0.1 || l > 0.9) return false;
                if (s < 0.15) return false;
                // sea hue range: 165° to 270° (cyan to deep blue)
                return (h >= 165 && h <= 270);
            }

            // ---------- pixel sampling (same as before) ----------
            function latLngToTile(lat, lng, zoom) {
                const tileSize = 256;
                const sinLat = Math.sin(lat * Math.PI / 180);
                const worldX = tileSize * (0.5 + lng / 360);
                const worldY = tileSize * (0.5 - Math.log((1 + sinLat) / (1 - sinLat)) / (4 * Math.PI));
                const scale = Math.pow(2, zoom);
                const tileX = Math.floor(worldX * scale / tileSize);
                const tileY = Math.floor(worldY * scale / tileSize);
                const pixelX = Math.floor((worldX * scale) - (tileX * tileSize));
                const pixelY = Math.floor((worldY * scale) - (tileY * tileSize));
                return { x: tileX, y: tileY, pixelX, pixelY };
            }

            function getPixelColor(lat, lng, zoom, callback) {
                const { x, y, pixelX, pixelY } = latLngToTile(lat, lng, zoom);
                const tileUrl = `https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/${zoom}/${y}/${x}`;

                fetch(tileUrl, { mode: 'cors', credentials: 'omit' })
                    .then(response => {
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        return response.blob();
                    })
                    .then(blob => {
                        const img = new Image();
                        img.crossOrigin = 'anonymous';
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            canvas.width = 256;
                            canvas.height = 256;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0);
                            try {
                                const pixelData = ctx.getImageData(pixelX, pixelY, 1, 1).data;
                                const [r, g, b] = pixelData;
                                callback(null, { r, g, b });
                            } catch (e) {
                                callback(e);
                            }
                        };
                        img.onerror = (err) => callback(err);
                        img.src = URL.createObjectURL(blob);
                    })
                    .catch(err => callback(err));
            }

            // ---------- click handler: sample -> classify -> random message ----------
            map.on('click', function(e) {
                const { lat, lng } = e.latlng;
                const zoom = map.getZoom();

                statusEl.textContent = '🔍 reading pixel...';
                statusEl.classList.add('loading');

                getPixelColor(lat, lng, zoom, (err, rgb) => {
                    statusEl.classList.remove('loading');
                    if (err) {
                        console.warn('Pixel fetch failed:', err);
                        statusEl.textContent = '⚠️ error – try again';
                        showMessage('⚠️ colour sample failed');
                        return;
                    }

                    const { r, g, b } = rgb;
                    const sea = isSeaColor(r, g, b);
                    
                    // Get random unused message based on land/sea
                    let comment;
                    if (sea) {
                        comment = getRandomMessage(seaMessages, usedSeaIndices);
                    } else {
                        comment = getRandomMessage(landMessages, usedLandIndices);
                    }

                    // Update status with RGB and counts (optional, shows pool health)
                    const seaUsedCount = usedSeaIndices.length;
                    const landUsedCount = usedLandIndices.length;
                    const seaTotal = seaMessages.length;
                    const landTotal = landMessages.length;
                    statusEl.textContent = `RGB(${r},${g},${b}) · sea:${seaUsedCount}/${seaTotal} land:${landUsedCount}/${landTotal}`;

                    showMessage(comment);
                });
            });

        })();
    </script>
</body>
</html>
